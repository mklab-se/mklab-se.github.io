<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-base); color: var(--text-primary); font-family: var(--font-sans); padding: 28px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Tabs } = window.MKLabDesignSystem_199e26;
function Demo() {
  const [tab,setTab]=React.useState('work');
  return (
    <div style={{maxWidth:520}}>
      <Tabs value={tab} onChange={setTab} tabs={[
        {value:'work',label:'Selected work'},
        {value:'people',label:'People',count:24},
        {value:'thinking',label:'Thinking'},
        {value:'access',label:'Access'},
      ]} />
      <div style={{padding:'20px 4px',color:'var(--text-secondary)',fontSize:14}}>
        Active tab: <span style={{color:'var(--ember-300)',fontFamily:'var(--font-mono)'}}>{tab}</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
