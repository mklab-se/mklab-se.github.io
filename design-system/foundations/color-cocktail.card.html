<!-- @dsCard group="Colors" viewport="700x200" name="Cocktail palette — data only" subtitle="Bright drink colors. Charts & data viz only — never chrome." -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-base);font-family:var(--font-mono);padding:22px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.sw{height:120px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;border:1px solid var(--border-subtle)}
.n{font-size:8.5px;color:#fff;letter-spacing:.04em}.h{font-size:8px;color:rgba(255,255,255,.75);margin-top:2px}
</style></head><body>
<div class="grid">
<div class="sw" style="background:var(--drink-citrus)"><span class="n" style="color:#4a2e00">Citrus</span><span class="h" style="color:#4a2e00">#ffb02e</span></div>
<div class="sw" style="background:var(--drink-bitter)"><span class="n">Bitter</span><span class="h">#e8341c</span></div>
<div class="sw" style="background:var(--drink-herbal)"><span class="n">Herbal</span><span class="h">#4fb477</span></div>
<div class="sw" style="background:var(--drink-curacao)"><span class="n">Curaçao</span><span class="h">#2f9bd8</span></div>
<div class="sw" style="background:var(--drink-berry)"><span class="n">Berry</span><span class="h">#a24bd8</span></div>
<div class="sw" style="background:var(--drink-gold)"><span class="n" style="color:#463618">Gold</span><span class="h" style="color:#463618">#d9b46a</span></div>
</div>
</body></html>
