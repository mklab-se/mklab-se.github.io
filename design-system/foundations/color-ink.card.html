<!-- @dsCard group="Colors" viewport="700x180" name="Ink — the graphite scale" subtitle="Near-black backgrounds up through white. The spine of the system." -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-base);font-family:var(--font-mono);padding:22px}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.n{font-size:9px;letter-spacing:.08em;color:var(--ink-300)}
.h{font-size:8px;color:var(--ink-500);margin-top:2px}
.dark .n{color:var(--ink-600)}.dark .h{color:var(--ink-600)}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--ink-950)"><span class="n">950</span><span class="h">#050505</span></div>
<div class="sw" style="background:var(--ink-850)"><span class="n">850</span><span class="h">#101012</span></div>
<div class="sw" style="background:var(--ink-750)"><span class="n">750</span><span class="h">#1c1c21</span></div>
<div class="sw" style="background:var(--ink-600)"><span class="n">600</span><span class="h">#33333a</span></div>
<div class="sw" style="background:var(--ink-400)"><span class="n">400</span><span class="h">#6b6b74</span></div>
<div class="sw" style="background:var(--ink-300)"><span class="n">300</span><span class="h">#8f8f98</span></div>
<div class="sw dark" style="background:var(--ink-100)"><span class="n">100</span><span class="h">#d6d6db</span></div>
<div class="sw dark" style="background:var(--ink-000)"><span class="n">000</span><span class="h">#ffffff</span></div>
</div>
</body></html>
