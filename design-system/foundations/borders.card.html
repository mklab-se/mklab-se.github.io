<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--surface-base);padding:26px;font-family:var(--font-mono);display:flex;gap:18px}
.c{flex:1;text-align:center}

.t{font-size:9px;color:var(--text-tertiary);margin-top:10px}
</style></head><body>
<div class="c"><div class="b" style="border:1px solid var(--border-subtle)"></div><div class="t">subtle · 6%</div></div>
<div class="c"><div class="b" style="border:1px solid var(--border-default)"></div><div class="t">default · 10%</div></div>
<div class="c"><div class="b" style="border:1px solid var(--border-strong)"></div><div class="t">strong · 18%</div></div>
<div class="c"><div class="b" style="border:1px solid var(--border-accent);box-shadow:var(--glow-ember-sm)"></div><div class="t">accent</div></div>
</body></html>
