<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Muted, adult status colors — no candy" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-base);font-family:var(--font-mono);padding:22px}
.row{display:flex;gap:10px}
.sw{flex:1;height:78px;border-radius:var(--radius-md);display:flex;align-items:center;gap:9px;padding:0 14px;border:1px solid var(--border-subtle);background:var(--surface-card)}
.dot{width:12px;height:12px;border-radius:50%}
.n{font-size:10px;color:var(--ink-200)}.h{font-size:8px;color:var(--ink-400);display:block;margin-top:2px}
</style></head><body>
<div class="row">
<div class="sw"><span class="dot" style="background:var(--status-positive)"></span><div><span class="n">Positive</span><span class="h">#4fb477</span></div></div>
<div class="sw"><span class="dot" style="background:var(--status-warning)"></span><div><span class="n">Warning</span><span class="h">#f5a623</span></div></div>
<div class="sw"><span class="dot" style="background:var(--status-critical)"></span><div><span class="n">Critical</span><span class="h">#e8341c</span></div></div>
<div class="sw"><span class="dot" style="background:var(--status-info)"></span><div><span class="n">Info</span><span class="h">#6b6b74</span></div></div>
</div>
</body></html>
