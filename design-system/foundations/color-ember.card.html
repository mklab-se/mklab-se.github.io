<!-- @dsCard group="Colors" viewport="700x180" name="Ember — the signature accent" subtitle="The only chromatic voice. Drawn from the bar's red backlight." -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-base);font-family:var(--font-mono);padding:22px}
.row{display:flex;gap:10px}
.sw{flex:1;height:110px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-subtle)}
.n{font-size:9px;letter-spacing:.08em}.h{font-size:8px;opacity:.7;margin-top:2px}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--ember-100)"><span class="n" style="color:#7a2a12">100</span><span class="h" style="color:#7a2a12">#ffd8cc</span></div>
<div class="sw" style="background:var(--ember-300)"><span class="n" style="color:#5c1c08">300</span><span class="h" style="color:#5c1c08">#ff8a66</span></div>
<div class="sw" style="background:var(--ember-500);box-shadow:var(--glow-ember-md)"><span class="n" style="color:#fff">500 · primary</span><span class="h" style="color:#ffe">#ff4d1c</span></div>
<div class="sw" style="background:var(--ember-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:#ffd8cc">#ed3d10</span></div>
<div class="sw" style="background:var(--ember-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:#ffd8cc">#c22f08</span></div>
</div>
</body></html>
