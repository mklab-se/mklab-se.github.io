<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--surface-base);padding:30px;font-family:var(--font-mono);display:flex;gap:26px;align-items:center;justify-content:center}
.c{text-align:center}
.b{width:96px;height:96px;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg)}
.t{font-size:9px;color:var(--text-tertiary);margin-top:14px}
</style></head><body>
<div class="c"><div class="b" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-xl)"></div><div class="t">xl</div></div>
</body></html>
