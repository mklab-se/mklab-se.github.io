<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Fluid-ready scale from 6xl display down to fine print" -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--surface-base);padding:24px 28px;font-family:var(--font-sans);color:var(--text-primary)}
.r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
.t{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);width:74px;flex-shrink:0}
.s{color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body>
<div class="r"><span class="t">5xl · 76</span><span class="s" style="font-family:var(--font-display);font-weight:300;font-size:44px">Threshold</span></div>
<div class="r"><span class="t">3xl · 42</span><span class="s" style="font-family:var(--font-display);font-size:30px">The standard</span></div>
<div class="r"><span class="t">xl · 25</span><span class="s" style="font-size:22px;font-weight:600">Section heading</span></div>
<div class="r"><span class="t">base · 15</span><span class="s" style="font-size:15px;color:var(--text-secondary)">Body copy sits here, calm and legible.</span></div>
<div class="r"><span class="t">xs · 12</span><span class="s" style="font-size:12px;font-family:var(--font-mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary)">Metadata label</span></div>
</body></html>
