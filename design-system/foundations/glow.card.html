<!-- @dsCard group="Effects" viewport="700x210" name="The ember glow" subtitle="The signature. What makes controls feel alive & expensive." -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--surface-base);padding:34px;font-family:var(--font-mono);display:flex;gap:34px;align-items:center;justify-content:center}
.c{text-align:center}
.b{width:96px;height:96px;background:var(--ember-500);border-radius:var(--radius-lg)}
.o{width:96px;height:96px;background:var(--surface-card);border:1px solid var(--candle-500);border-radius:var(--radius-lg)}
.t{font-size:9px;color:var(--text-tertiary);margin-top:14px}
</style></head><body>
<div class="c"><div class="b" style="box-shadow:var(--glow-ember-sm)"></div><div class="t">ember · sm</div></div>
<div class="c"><div class="b" style="box-shadow:var(--glow-ember-md)"></div><div class="t">ember · md</div></div>
<div class="c"><div class="b" style="box-shadow:var(--glow-ember-lg)"></div><div class="t">ember · lg</div></div>
<div class="c"><div class="o" style="box-shadow:var(--glow-candle)"></div><div class="t">candle</div></div>
</body></html>
