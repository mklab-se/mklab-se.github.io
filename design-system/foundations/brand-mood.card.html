<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--ink-950);padding:0;position:relative;font-family:var(--font-mono)}
.wrap{height:260px;overflow:hidden;position:relative}
img{width:100%;height:100%;object-fit:cover;display:block}
.grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,5,5,.1),rgba(5,5,5,.65))}
.q{position:absolute;right:26px;top:50%;transform:translateY(-50%);max-width:280px;text-align:right}
.q .m{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ember-300);margin:0 0 8px}
.q .d{font-family:var(--font-display);font-weight:300;font-size:26px;color:#fff;line-height:1.1;margin:0}
</style></head><body>
<div class="wrap">
<img src="../assets/brand/bar-mood.png"/>
<div class="grad"></div>
<div class="q"><p class="m">Reference light</p><p class="d">Whatever's hard, we bring the light.</p></div>
</div>
</body></html>
