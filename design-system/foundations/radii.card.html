<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Restrained. Nothing bubbly." -->
<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;background:var(--surface-base);padding:26px;font-family:var(--font-mono);display:flex;gap:18px;align-items:flex-end}
.b{width:78px;height:78px;background:var(--surface-card);border:1px solid var(--border-strong)}
.c{text-align:center}
.t{font-size:9px;color:var(--text-tertiary);margin-top:8px}
</style></head><body>
<div class="c"><div class="b" style="border-radius:var(--radius-xs)"></div><div class="t">xs · 3</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="t">sm · 5</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><div class="t">md · 8</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="t">lg · 12</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="t">xl · 18</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-pill);width:120px"></div><div class="t">pill</div></div>
</body></html>
